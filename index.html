<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            padding: 20px;
        }
        
        h1 {
            color: #89b5fa;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .kanban-board {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .column {
            flex: 1;
            background: #313244;
            border-radius: 8px;
            padding: 15px;
            min-height: 400px;
        }
        
        .column h2 {
            color: #89b5fa;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #45475a;
        }
        
        .task-card {
            background: #45475a;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .task-card h3 {
            color: #cba6f7;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .task-card p {
            color: #a6adc8;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .task-card .task-id {
            color: #93a3b5;
            font-size: 11px;
        }
        
        .add-task-btn {
            background: #89b5fa;
            color: #1e1e2e;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .add-task-btn:hover {
            background: #b4befe;
        }
        
        .add-task-form {
            background: #45475a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        
        .add-task-form input {
            background: #313244;
            border: 1px solid #45475a;
            color: #cdd6f4;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .add-task-form input:focus {
            outline: none;
            border-color: #89b5fa;
        }
        
        .add-task-form .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        
        .btn-save {
            background: #a6e3a1;
            color: #1e1e2e;
        }
        
        .btn-cancel {
            background: #45475a;
            color: #cdd6f4;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        
        .task-actions button {
            background: #45475a;
            color: #93a3b5;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .task-actions button:hover {
            background: #313244;
        }
        
        .task-actions .delete {
            color: #f38ba8;
        }
        
        .task-actions .delete:hover {
            background: #313244;
        }
    </style>
</head>
<body>
    <h1>📋 ToDo List</h1>
    
    <div class="kanban-board">
        <div class="column">
            <h2>🔨 To Do</h2>
            <button class="add-task-btn" onclick="showAddForm('todo')">+ Add Task</button>
            <div id="todo-container"></div>
        </div>
        
        <div class="column">
            <h2>🚧 In Progress</h2>
            <button class="add-task-btn" onclick="showAddForm('inprogress')">+ Add Task</button>
            <div id="inprogress-container"></div>
        </div>
        
        <div class="column">
            <h2>✅ Done</h2>
            <button class="add-task-btn" onclick="showAddForm('done')">+ Add Task</button>
            <div id="done-container"></div>
        </div>
    </div>
    
    <script>
        let tasks = JSON.parse(localStorage.getItem('todo-tasks')) || [];
        let isAddingTask = false;
        
        function renderTasks() {
            const todoContainer = document.getElementById('todo-container');
            const inprogressContainer = document.getElementById('inprogress-container');
            const doneContainer = document.getElementById('done-container');
            
            todoContainer.innerHTML = '';
            inprogressContainer.innerHTML = '';
            doneContainer.innerHTML = '';
            
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.draggable = true;
                card.innerHTML = `
                    <h3>${task.title}</h3>
                    <p>${task.description}</p>
                    <span class="task-id">ID: ${task.id} | Created: ${task.createdAt}</span>
                    <div class="task-actions">
                        ${task.status !== 'todo' ? '<button onclick="moveTask(\'' + task.id + '\', \'todo\')">← To Do</button>' : ''}
                        ${task.status !== 'inprogress' ? '<button onclick="moveTask(\'' + task.id + '\', \'inprogress\')">→ In Progress</button>' : ''}
                        ${task.status !== 'done' ? '<button onclick="moveTask(\'' + task.id + '\', \'done\')">→ Done</button>' : ''}
                        <button class="delete" onclick="deleteTask(\'' + task.id + '\')">Delete</button>
                    </div>
                `;
                
                card.addEventListener('dragstart', () => {
                    card.style.opacity = '0.5';
                });
                
                card.addEventListener('dragend', () => {
                    card.style.opacity = '1';
                });
                
                card.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });
                
                card.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const newStatus = e.target.closest('.column').querySelector('h2').innerText.split(' ')[1].toLowerCase();
                    const taskIndex = tasks.findIndex(t => t.id === task.id);
                    if (taskIndex !== -1) {
                        tasks[taskIndex].status = newStatus;
                        saveTasks();
                        renderTasks();
                    }
                });
                
                if (task.status === 'todo') {
                    todoContainer.appendChild(card);
                } else if (task.status === 'inprogress') {
                    inprogressContainer.appendChild(card);
                } else if (task.status === 'done') {
                    doneContainer.appendChild(card);
                }
            });
        }
        
        function showAddForm(status) {
            isAddingTask = true;
            const form = document.createElement('div');
            form.className = 'add-task-form';
            form.innerHTML = `
                <input type="text" id="task-title" placeholder="Task Title">
                <input type="text" id="task-description" placeholder="Task Description">
                <div class="btn-group">
                    <button class="btn btn-save" onclick="saveTask('${status}')">Save</button>
                    <button class="btn btn-cancel" onclick="cancelAddTask()">Cancel</button>
                </div>
            `;
            
            const container = document.getElementById(status + '-container');
            container.insertBefore(form, container.firstChild);
            
            document.getElementById('task-title').focus();
        }
        
        function saveTask(status) {
            const title = document.getElementById('task-title').value.trim();
            const description = document.getElementById('task-description').value.trim();
            
            if (!title) {
                alert('Please enter a task title');
                return;
            }
            
            const task = {
                id: Date.now(),
                title: title,
                description: description || 'No description',
                status: status,
                createdAt: new Date().toLocaleString('ja-JP')
            };
            
            tasks.push(task);
            saveTasks();
            renderTasks();
            
            const form = document.querySelector('.add-task-form');
            if (form) {
                form.remove();
            }
            isAddingTask = false;
        }
        
        function cancelAddTask() {
            const form = document.querySelector('.add-task-form');
            if (form) {
                form.remove();
            }
            isAddingTask = false;
        }
        
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
            }
        }
        
        function moveTask(id, newStatus) {
            const taskIndex = tasks.findIndex(t => t.id === id);
            if (taskIndex !== -1) {
                tasks[taskIndex].status = newStatus;
                saveTasks();
                renderTasks();
            }
        }
        
        function saveTasks() {
            localStorage.setItem('todo-tasks', JSON.stringify(tasks));
        }
        
        // Keyboard shortcut for adding tasks (Ctrl+T)
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 't') {
                e.preventDefault();
                showAddForm('todo');
            }
        });
        
        renderTasks();
    </script>
</body>
</html>
